  # -- Additional ui volumes.
  extraVolumes: []
  # -- Additional ui volumeMounts.
  extraVolumeMounts: []
# -- Migrate is in charge of ensuring the database schema is up to date,
# running database migrations if needed (e.g. after an upgrade). It runs as an
# init container to the ingester deployment.
migrate:
  # -- Configure log level for migrate. Defaults to the top level logLevel if
  # unset. Valid values are: trace, debug, info, warn and error.
  logLevel: ~
  image:
    override: ~
    repository: quay.io/isovalent/hubble-timescape
    tag: "v1.18.5"
    pullPolicy: IfNotPresent
    pullSecrets: []
  resources: {}
  securityContext:
    # readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  # -- Additional migrate volumes.
  extraVolumes: []
  # -- Additional migrate volumeMounts.
  extraVolumeMounts: []
  pprof:
    # -- Enables pprof for Timescape's migrator.
    enabled: true
    address: localhost
    port: 6060
  gops:
    # -- Enables gops for Timescape's migrator.
    enabled: true
    port: 9898
  clickhouse:
    client:
      dsn: {}
    tls:
      ca: {}
    credentials:
      # -- The ClickHouse username to authenticate with.
      username: timescape_migrate
      # -- The name of the secret containing ClickHouse database admin
      # credentials.
      # DDL (CREATE, ALTER, DROP, TRUNCATE) and read/write permissions are
      # provided.
      # This secret MUST be created by the user, and MUST contain the following
      # key:
      #   - CLICKHOUSE_PASSWORD
      secretName: "hubble-timescape-migrate-creds"
  # -- Configures the time-to-live for all tables in the database. Events older
  # than this value are not ingested. Events which are older than the TTL are
  # automatically pruned from the database. This TTL value can be overridden by
  # event type (see for example flows.ttl below).
  # Defaults to 2 weeks or 1 hour if Timscape runs without persistent storage.
  ttl: ~
  # -- ConnectionLogs ingestion related configuration.
  connectionLogs:
    # -- Overrides the time-to-live for connectionLogs in the database.
    # ConnectionLogs older than this value are not ingested. ConnectionLogs
    # which are older than the TTL are automatically pruned from the database.
    # defaults to migrate.ttl if unset.
    ttl: ~
    # -- The age at which connection logs are rolled up into hourly aggregates
    # (0 means no hourly rollups). Must be at least 1 hour and less than
    # connection-logs-daily-rollup-age and connectionLogs.ttl if it is set.
    # The default value is 24 hours if unset.
    hourlyRollupAge: ~
    # -- The age at which connection logs are rolled up into daily aggregates
    # (0 means no daily rollups). Must be at least 24 hours and less than
    # connectionLogs.ttl if it is set.
    # The default value is 7 days if unset.
    dailyRollupAge: ~
  # -- Hubble Flows ingestion related configuration.
  flows:
    # -- Overrides the time-to-live for flows in the database. Flows older than
    # this value are not ingested. Flows which are older than the TTL are
    # automatically pruned from the database.
    ttl: ~
  # -- Hubble K8s Events ingestion related configuration.
  k8s:
    # -- Overrides the time-to-live for k8s events in the database. See
    # flows.ttl. By default, no TTL is set for k8s events and we rely on
    # aggregation instead.
    # This is because k8s events act as source of truth for k8s resources and
    # multiple features rely on them. Having a ttl can lead to  deleting events
    # that reference exisiting resources.
    ttl: ~
    # -- Configure the aggregation TTL for k8s events in the database.
    # Events older than this will be aggregated together.
    # If k8s.ttl is set, aggregationTTL must be less than k8s.ttl.
    # Defaults to 2 weeks.
    aggregationTTL: ~
  # -- Hubble Assessment Reports related configuration.
  assessmentReports:
    # -- Sets the time-to-live for assessment reports in the database. This option
    # is not configured with the value from ttl by default like flows.
    # Defaults to 1 month.
    ttl: ~
  # -- System Status related configuration.
  systemStatus:
    # -- Sets the time-to-live for system status updates in the database.
    # Defaults to 24 hours.
    ttl: ~
# -- Ingester is a deployment responsible for loading data from object storage
# into the ClickHouse database for indexing.
ingester:
  # -- Deploy Hubble Timescape ingestion that loads data from object storage
  # into the ClickHouse database.
  enabled: true
  # -- Configure log level for ingester. Defaults to the top level logLevel if
  # unset. Valid values are: trace, debug, info, warn and error.
  logLevel: ~
  # -- There must be only one ingest pod at all time.
  replicaCount: 1
  # -- The ingester deployment update strategy.
  updateStrategy:
    type: Recreate
  image:
    override: ~
    repository: quay.io/isovalent/hubble-timescape
    tag: "v1.18.5"
    pullPolicy: IfNotPresent
