    apiVersion: "gateway.networking.k8s.io/v1alpha3"
    # -- Labels to add to the TLSRoute.
    labels: {}
    # -- Annotations to add to the TLSRoute.
    annotations: {}
    # -- Parent references for the TLSRoute.
    parentRefs: []
    # -- Hostnames for the TLSRoute.
    hostnames: []
    # -- Additional rules for the TLSRoute.
    additionalRules: []
  observability:
    flows:
      # -- Whether to enable the Flows page.
      enabled: true
