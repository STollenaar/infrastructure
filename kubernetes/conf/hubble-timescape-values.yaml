  # -- Roll out hubble-timescape-ui pod when its configmap is updated. When
  # deployed as part of timescape-lite, lite.rolloutPods must also be true.
  rollOutPods: true
  tls:
    # -- Enables TLS for the UI HTTP server.
    # Note that enabling TLS is incompatible with exposing the UI through an Ingress or Gateway API
    # HTTPRoute unless `.ui.backendTLSPolicy.enabled=true`. For Gateway API passthrough,
    # use `.ui.tlsRoute.enabled=true`.
    enabled: false
    auto:
      # -- Enables automatically provisioning TLS certificates for the UI HTTP server.
      enabled: false
      # -- Set the method to auto-generate certificates. Supported values:
      # - cronJob:      This method uses a Kubernetes CronJob the generate any
      #                 certificates not provided by the user at installation
      #                 time.
      # - certmanager:  This method use cert-manager to generate & rotate certificates.
      method: ""
      certmanager:
        # -- Certificate issuer ref.
        # See https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
        issuerRef: ~
        privateKey:
          # -- Algorithm configuration for the generated certificate. See
          # https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
          algorithm: ECDSA
          # -- Rotation policy for the private key.
          # https://cert-manager.io/docs/usage/certificate/#issuance-behavior-rotation-of-the-private-key
          rotationPolicy: Always
    # -- The name of the secret containing TLS material for the UI HTTP server.
    # The secret must be of type `kubernetes.io/tls`.
    secretName: "hubble-timescape-ui-cert"
    certificate:
      # -- Additional DNS Subject Alternative Names to include in auto-generated UI server certificates.
      # Hostnames configured under `ui.tlsRoute.hostnames` are added automatically for convenience.
      extraDNSNames: []
    # -- Configure the CA trust bundle used for the validation of the certificates.
    # When enabled, it overrides the content of the 'ca.crt' field of the respective
    # certificates, allowing for CA rotation with no down-time. Takes precedence over
    # tls.caBundle.
    caBundle:
      # -- Enable the use of the CA trust bundle.
      enabled: ~
      # -- Name of the ConfigMap containing the CA trust bundle.
      name: ~
      # -- Entry of the ConfigMap containing the CA trust bundle.
      key: ~
      # -- Use a Secret instead of a ConfigMap.
      useSecret: ~
  auth:
    # -- Whether to enable authentication for the UI. Will be set to true, if RBAC is enabled.
    enabled: false
    # -- UI session key is used to encrypt the UI session state. Should be a randomly
    # generated password with at least 16 characters.
    sessionKey:
      secretName: hubble-timescape-ui
      secretKey: session-key
    oidc:
      # -- OIDC Server discovery endpoint URL.
      # e.g. https://my-account.okta.com/oauth2/default/.well-known/openid-configuration
      # Will default to .server.rbac.oidcURL when RBAC is enabled.
      issuerURL: ~
      # -- OIDC custom CA to verify against.
      # Will default to .server.rbac.oidcCA when RBAC is enabled.
      issuerCA:
        configMap:
          name: ~
          key: "ca.crt"
      # -- OID redirect URL.
      # The URL to redirect to, after the application was authorized. This need to be
      # set to URI_USED_TO_ACCESS_TIMESCAPE_UI/oauth2/callback.
      # When the Timescape UI is exposed through `.ui.ingress`, the redirect URL will be
      # populated automatically.
      redirectURL: ~
      # -- OIDC application clientID.
      clientID: ~
      # -- OIDC application clientSecret.
      clientSecret:
        secretName: hubble-timescape-ui
        secretKey: client-secret
      # -- Client assertion type. Set to urn:ietf:params:oauth:client-assertion-type:jwt-bearer to use a JWT.
      clientAssertionType: ~
      # -- The file containing the client assertion to use if clientAssertionType is set.
      clientAssertionFile: ~
      # -- The OAuth2 scopes to send to the OIDC provider.
      scopes: ["openid", "email", "offline_access"]
      # -- OIDC user claim to extract from the id_token.
      # The extracted value is used to uniquely identifier the user and perform
      # authorization when RBAC is enabled.
      idTokenUserClaim: email
      # -- OIDC auth code redirect URL extra fields.
      # Enrich the auth code redirect URL with extra fields in the query section.
      # Such fields are sometimes required in environments that are using a non
      # standard OIDC implementation.
      extraFields: []
      # extraFields:
      #   - key: resource
      #     value: example
  ingress:
    # -- Whether to create an 'Ingress' resource.
    enabled: true
    # -- The annotations to place on the 'Ingress' resource.
    # If you see the following error in your Nginx ingress controller logs:
    # 'upstream sent too big header while reading response header from upstream'
    # Add the following annotation: 'nginx.ingress.kubernetes.io/proxy-buffer-size: 8k'
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-buffer-size: 8k
    # -- The host to use for the 'Ingress' resource.
    host: hubble-timescape.home.spicedelver.me
    # -- The name of the 'IngressClass' cluster resource.
    ingressClassName: ~
    # -- TLS configuration for the 'Ingress' resource.
    tls:
      # -- Whether to enable TLS for the 'Ingress' resource.
      enabled: true
      # -- The name of the secret containing TLS material for the 'Ingress' resource.
      secretName: "hubble-timescape-tls"
  route:
    # -- Whether to create a Gateway API 'HTTPRoute' resource.
    enabled: false
    # -- API version of the route resource.
    # @default -- "gateway.networking.k8s.io/v1"
    apiVersion: "gateway.networking.k8s.io/v1"
    # -- Kind of the route resource. Only "HTTPRoute" is supported here. Use
    # `ui.tlsRoute` to configure Gateway API TLS passthrough.
    # @default -- "HTTPRoute"
    kind: "HTTPRoute"
    # -- Labels to add to the route.
    labels: {}
    # -- Annotations to add to the route.
    annotations: {}
    # -- Parent references for the route.
    parentRefs: []
    # -- Hostnames for the route.
    hostnames: []
    # -- Additional rules for the route.
    additionalRules: []
    # -- Filters to apply to the route.
    filters: []
  backendTLSPolicy:
    # -- Whether to create a Gateway API 'BackendTLSPolicy' resource for the UI Service.
    # To enable this option, TLS must be enabled for the UI HTTP server (ui.tls.enabled=true).
    enabled: false
    # -- API version of the BackendTLSPolicy resource.
    # @default -- "gateway.networking.k8s.io/v1"
    apiVersion: "gateway.networking.k8s.io/v1"
    # -- Labels to add to the BackendTLSPolicy.
    labels: {}
    # -- Annotations to add to the BackendTLSPolicy.
    annotations: {}
    # -- TLS validation options for the BackendTLSPolicy.
    # One of caCertificateRefs or wellKnownCACertificates must be set when enabling the
    # BackendTLSPolicy. Note that when using ui.tls.auto.enabled=true, the CA certificate is NOT
    # automatically added to the BackendTLSPolicy.
    validation:
      # -- Hostname used for SNI and certificate validation. Defaults to the UI Service FQDN.
      hostname: ""
      # -- References to a ConfigMap or Secret containing a PEM-encoded CA bundle in `ca.crt`.
      caCertificateRefs: []
      # -- Well-known CA bundle set to use instead of explicit certificate refs. Example: "System".
      wellKnownCACertificates: ""
    # -- Implementation-specific BackendTLSPolicy options.
    options: {}
  tlsRoute:
    # -- Whether to create a Gateway API 'TLSRoute' resource.
    # To enable this option, TLS must be enabled for the UI HTTP server (ui.tls.enabled=true).
    enabled: false
    # -- API version of the TLSRoute resource.
