# -- Globally configure the log level. Valid values are: trace, debug, info,
# warn and error.
logLevel: info
# -- Install network policies for Hubble Timescape.
networkPolicies:
  # -- Install CiliumNetworkPolicies for Hubble Timescape components
  enabled: false
  clickhouseOperatorNamespace: clickhouse-operator
  # -- CiliumNetworkPolicies endpoint selectors allowing Hubble UI to access Hubble Timescape server.
  hubbleUI:
    ingress:
      fromEndpoints:
        - matchExpressions:
            - key: k8s-app
              operator: In
              values:
                - hubble-ui
            - key: "k8s:io.kubernetes.pod.namespace"
              operator: In
              values:
                - kube-system
                - hubble-ui
                - hubble-ui-enterprise
  # -- CiliumNetworkPolicies endpoint selectors allowing Hubble Enterprise
  # fluentd and Cilium vector to access Hubble Timescape ingester's push API.
  push:
    ingress:
      fromEndpoints:
        # Allow access from fluentd pushing via hubble-enterprise
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - hubble-enterprise
            - key: "k8s:io.kubernetes.pod.namespace"
              operator: In
              values:
                - kube-system
                - hubble-enterprise
        # Allow access from Cilium vector
        - matchExpressions:
            - key: k8s-app
              operator: In
              values:
                - cilium-vector
            - key: "k8s:io.kubernetes.pod.namespace"
              operator: In
              values:
                - kube-system
                - cilium
  # -- CiliumNetworkPolicies endpoint selectors allowing Cilium
  # Hubble stream exporter to access Hubble Timescape ingester's stream API.
  stream:
    ingress:
      fromEndpoints:
        # Allow access from Cilium Hubble stream exporter
        - matchExpressions:
            - key: k8s-app
              operator: In
              values:
                - cilium-agent
            - key: "k8s:io.kubernetes.pod.namespace"
              operator: In
              values:
                - kube-system
                - cilium
  monitoring:
    ingress:
      fromEndpoints: ~
      # Example:
      # fromEndpoints:
      #   - matchLabels:
      #       "k8s:app.kubernetes.io/name": prometheus
      #       "k8s:io.kubernetes.pod.namespace": monitoring
  profiling:
    ingress:
      fromEndpoints: ~
      # Example:
      # fromEndpoints:
      #   - matchLabels:
      #       "k8s:app.kubernetes.io/name": phlare
      #       "k8s:io.kubernetes.pod.namespace": phlare
# -- Clickhouse controls installation and values related to the ClickHouse
# instance.
clickhouse:
  # -- Create a read-only account to access the database. This account should
  # be used only by external components (not included in this chart).
  readOnlyAccount:
    enabled: false
    username: "ui"
    credentials:
      # -- The name of the secret containing ClickHouse database credentials.
      # Only read permissions (SELECT, EXISTS) are provided.
      # This secret MUST be created by the user, and MUST contain the following
      # key:
      #   - CLICKHOUSE_PASSWORD
      secretName: "hubble-timescape-ui-creds"
  # -- Client allows for configuring client access to the ClickHouse database.
  client:
    # -- The data source name (dsn) defines ClickHouse database connection
    # parameters that are used by Hubble Timescape components such as the server,
    # ingester or CLI.
    dsn:
      # -- Database defines the database name.
      database: "hubble"
      # -- Host is the database host, typically the name of the ClickHouse service.
      # Must be specified if clickhouse.cluster.enabled is false.
      host: ~
      # -- Port is the port to connect to the database. Defaults to 9000 in
      # plaintext mode and 9440 in TLS mode.
      port: ~
      # -- Establishing a connection to the database should take less than the
      # dial timeout. The value is provided as a duration string, ie a signed
      # sequence of decimal numbers with a unit suffix such as "300ms" or "1m30s".
      # Valid time units are "ns", "us", "ms", "s", "m", "h".
      dialTimeout: 10s
      # -- A deadline for read calls. If unset, reading operations never timeout.
      # The value is provided as a duration string, ie a signed sequence of
      # decimal numbers with a unit suffix such as "300ms" or "1m30s".  Valid
      # time units are "ns", "us", "ms", "s", "m", "h".
      readTimeout: ~
      # -- Enable verbose database logging.
      debug: false
      # -- Compression allows enabling compression.
      compression:
        # -- The compression method must be one of "none", "lz4" or "zstd".
        method: ~
      send_logs:
        # -- Enable streaming server side logs back to the client.
        # Valid values: "none", "fatal", "critical", "error", "warning",
        # "notice", "information", "debug", "trace"
        level: ~
    serverLogs:
      # -- Enable logging clickhouse-server logs. Requires
      # clickhouse.client.dsn.send_logs.level to be configured to take effect.
      log: false
    progress:
      # -- Enable query progress logs
      log: false
  # -- TLS allows for configuring TLS for the ClickHouse database and ClickHouse clients.
  tls:
    # -- Enables TLS for clickhouse server and all timescape clickhouse clients.
    enabled: false
    auto:
      # -- Enables automatically provisioning TLS certificates.
      enabled: false
      # -- Set the method to auto-generate certificates. Supported values:
      # - cronJob:      This method uses a Kubernetes CronJob the generate any
      #                 certificates not provided by the user at installation
      #                 time.
      # - certmanager:  This method use cert-manager to generate & rotate certificates.
      method: ""
      certmanager:
        # -- Certificate issuer ref.
        # See https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
        issuerRef: ~
        # -- Algorithm configuration for the generated certificate. See
        # https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
        privateKey:
          algorithm: ECDSA
    # -- Server references the secret that contains TLS material to enable TLS
    # for the database server(s).
    server:
      # -- The name of the secret containing TLS material.
      # The secret must be of type `kubernetes.io/tls`.
      secretName: "hubble-timescape-clickhouse-cert"
    ca:
      # -- The configmap containing the CA for ClickHouse
      configMap:
        name: ~
        key: "ca.crt"
  # -- Adjust settings for the user profiles.
  userProfiles:
    # -- The admin profile is the most privileged one and is only used for the
    # 'migrate' user which is in charge of creating and updating the database
    # tables.
    admin:
      name: timescape_admin_role
      maxMemoryUsage: ~
    # -- The readwrite profile cannot run DDL queries (CREATE, ALTER, etc) but
    # is allowed to run INSERT queries in addition to read-only ones. It is
    # only used by the `ingester` user which is in charge of inserting data
    # into the database.
    readWrite:
      name: timescape_readwrite_role
      maxMemoryUsage: ~
    # -- The readOnly profile can only run read-only queries (e.g. SELECT,
    # DESCRIBE). It is used by all other users.
    readOnly:
      name: timescape_readonly_role
      maxMemoryUsage: ~
    # -- The trimmer profile is also highly privileged. It is able to run all
    # queries and issue DDL queries which is required for deleting rows (using
    # ALTER TABLE .. DELETE). It is only used for the 'trimmer' user which is
    # in charge of querying for flows and deleting the oldest entries if over
    # the trimmer.flowsCount.
    trimmer:
      name: timescape_trimmer_role
      maxMemoryUsage: ~
    # -- extraConfig can be used to add arbitrary configuration options to the
    # clickhouse user profiles.
    extraConfig: {}
  # -- settings can be used to specify custom ClickHouse server settings
  settings:
    logger:
      level: information
    # -- maxConnections is the maximum number of inbound connections that a
    # ClickHouse server accepts.
    maxConnections: 4096
    # -- maxConcurrentQueries is the maximum number of simultaneously processed
    # queries.
    maxConcurrentQueries: 100
    # -- maxSuspiciousBrokenParts is the maximum number of broken parts that are allowed
    # at startup. If the number of broken parts exceeds this value, the server will
    # refuse to start and throw an error such as:
    #   DB::Exception: Suspiciously many broken parts to remove.
    # For more details, see: https://kb.altinity.com/altinity-kb-setup-and-maintenance/suspiciously-many-broken-parts/.
    maxSuspiciousBrokenParts: 500
    # -- queryLog setting is deprecated, use clickhouse.settings.systemLogs
    queryLog: {}
    # -- systemLogs can be used to configure ClickHouse internal system log
    # tables.
    # System log tables can be very helpful when troubleshooting, but can over
    # time result in quite large storage usage. See
    # https://clickhouse.com/docs/en/operations/system-tables for more
    # information on system log tables.
    systemLogs:
      # -- enables log tables if they are not explicitly disabled in
      # clickhouse.settings.systemLogs.tables.
      enabled: true
      # -- ttl is the default time system logs are kept.
      # Defaults to "3 day", or "2 hour" when using Timescape Lite. The TTL is
      # specified as a ClickHouse interval type:
      # https://clickhouse.com/docs/en/sql-reference/data-types/special-data-types/interval
      ttl: ~
      # -- tables allows overriding `enable` and `ttl` on a per system log table basis.
      #
      # For example the following will disable the `processors_profile_log` table
      # and reduce the `query_log` table ttl to 1 hour:
      #
      # tables:
      #   processorsProfileLog:
      #     enabled: false
      #   queryLog:
      #     ttl: 1 hour
      tables:
        asynchronousInsertLog: {}
        asynchronousMetricLog: {}
        backupLog:
          ttl: 1 year
        blobStorageLog: {}
        crashLog:
          ttl: 1 year
        errorLog:
          ttl: 2 month
        metricLog: {}
        opentelemetrySpanLog:
          column: "fromUnixTimestamp64Micro(finish_time_us)"
        partLog: {}
        processorsProfileLog: {}
        queryLog: {}
        queryMetricLog: {}
        queryThreadLog: {}
        queryViewsLog: {}
        sessionLog: {}
        textLog: {}
        traceLog: {}
        zookeeperLog: {}
    # -- extraConfig can be used to add arbitrary configuration options to the
    # clickhouse server settings.
    extraConfig: {}
    # -- storage allows configuring clickhouse storage configuration options.
    #
    # # Experimental
    #
    # Notice: this functionality is EXPERIMENTAL and may be changed or removed
    # in a later release.
    # All configuration options under this key are also experimental.
    storage:
      # -- Policy configures which storage policy to use.
      #
      # Options:
      # - "" - Uses local disk as the primary data store.
      # - "s3" - Use S3 as the primary data store.
      # - "s3_cache" - Use S3 as the primary data store and use a local on-disk LRU cache. Requires s3.cache.enabled=true.
      policy: ""
      s3:
        endpoint: ~
        region: ~
        bucket: ~
        path: ~
        usePathStyleAccess: false
        tls:
          enabled: true
        cache:
          enabled: true
          maxSize: 10Gi
  # -- The cluster section may be used to automatically provision a ClickHouse
  # cluster for use by Hubble Timescape. A supported ClickHouse operator
  # provider must be installed prior to Hubble Timescape for the functionality
  # to work.
  cluster:
    # -- Specifies the ClickHouse cluster provider to use when creating the
    # ClickHouse cluster. Currently the only supported value is
    # "altinity-clickhouse-operator".
    provider: "altinity-clickhouse-operator"
    # -- Creates a ClickHouseInstallation to provision a new ClickHouse cluster
    # using clickhouse-operator.
    # clickhouse-operator must already be installed and configured to monitor
    # the namespace Hubble Timescape is running in.
    enabled: false
    chown: true
    livenessProbe:
      initialDelaySeconds: 60
    nodeSelector: {}
    tolerations: []
    affinity: {}
    resources: {}
    podAnnotations: {}
    podLabels: {}
    extraEnv: []
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsGroup: 101
      runAsNonRoot: true
      runAsUser: 101
      seccompProfile:
        type: RuntimeDefault
    podSecurityContext:
      # clickhouse GID is 101, and mounted files need to have the correct
      # permissions for clickhouse to read them
      fsGroup: 101
      seccompProfile:
        type: RuntimeDefault
    extraVolumes: []
    extraVolumeMounts: []
    image:
      override: ~
      repository: quay.io/isovalent/clickhouse-server
      # use skopeo inspect to get the multiarch manifest list digest
      # skopeo inspect docker://clickhouse/clickhouse-server:YOUR_TAG | jq -r .Digest
      tag: 25.8.18.1-alpine@sha256:4c4f6e375d80e743a46fa61eae291b30dda6cc36f1ac4a0d001e21aaaac0c04c
      pullPolicy: IfNotPresent
      pullSecrets: []
    priorityClassName: null
    volumes:
      data:
        size: 10Gi
        storageClassName: ~
    prometheus:
      serviceMonitor:
        # -- Create a ServiceMonitor resource to scrape metrics (requires prometheus-operator CRDs to be available).
        enabled: false
        # -- Namespace to create the service monitor in. Defaults to namespace of the helm release.
        namespace: ~
      prometheusRule:
        # -- Create a PrometheusRule resource with predefined alerts and recording rules.
        enabled: false
        rules:
          # -- Alert that will fire if the percentage of available space of the ClickHouse
          # volume is predicted to fall below the configured threshold in the configured
          # predictionTime.
          #
          # By default this means if we predict less than 20% available space in 48 hours.
          TimescapeClickhouseVolumeFillingUp:
            enabled: true
            threshold: 0.2
            predictionTime: 48h
      tableMetrics:
        # -- Adds an endpoint to the ServiceMonitor resource to scrape table metrics
        # (requires ServiceMonitor to be enabled).
        enabled: false
        credentials:
          username: timescape_table_metrics
          # -- The name of the secret containing ClickHouse database credentials.
          # Only read permissions (SELECT, EXISTS) are provided.
          # This secret MUST be created by the user, and MUST contain the following
          # keys:
          #   - CLICKHOUSE_USERNAME
          #   - CLICKHOUSE_PASSWORD
          secretName: "hubble-timescape-table-metrics-creds"
# -- Certgen configures certificate generation. If
# tls.auto.method=cronJob, for the server, ingester, or ClickHouse, these
# values are used for the Kubernetes CronJob which will be scheduled regularly
# to (re)generate certificates
certgen:
  image:
    override: ~
    repository: quay.io/isovalent/certgen
    tag: "v0.2.4"
    pullPolicy: IfNotPresent
    pullSecrets: []
  schedule: "0 0 1 */2 *"
  podSecurityContext:
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    # readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  priorityClassName: null
  resources: {}
  # -- We usually recommend not to specify default resources and to leave
  # this as a conscious choice for the user. This also increases chances
  # charts run on environments with little resources, such as Minikube. If
  # you do want to specify resources, uncomment the following lines, adjust
  # them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  serviceAccount:
    # -- Whether to create a Kubernetes service account for certgen. If set,
    # RBAC rules to allow creating and updating certificate will be created.
    # If an existing service account is used you need to make sure it has the
    # necessary permissions.
    create: true
    # -- The name of the Kubernetes service account to use for certgen.
    # Can be the name of an existing Kubernetes service account, in which case
    # 'create' should be 'false'.
    name: hubble-timescape-certgen
    # -- Annotations for the certgen Kubernetes service account
    annotations: ~
  # -- Additional certgen volumes.
  extraVolumes: []
  # -- Additional certgen volumeMounts.
  extraVolumeMounts: []
# -- Trimmer is an optional CronJob limiting the size of ClickHouse tables
# by periodically deleting the oldest data.
trimmer:
  # -- Desired max number of flows stored in ClickHouse. If 0 or null,
  # trimming flows is disabled.
  flowsCount: ~
  # -- Desired retention specified as a Go duration for k8s events stored in
  # ClickHouse. Only events corresponding to resources assumed deleted (last
  # event is of type DELETE) are considered. If 0s or null, trimming k8s events
  # is disabled. Defaults to 2 weeks.
  k8sEventsTTL: 336h0m0s
  # -- Job interval, in minutes. Must be a positive integer.
  trimIntervalMinutes: 60
  # -- Trimmer timeout specified as a Go duration. Defaults to trimIntervalMinutes minutes.
  # Examples: 30s, 1m, 5m, 1h
  timeout: ~
  image:
    override: ~
    repository: quay.io/isovalent/hubble-timescape
    tag: "v1.18.5"
    pullPolicy: IfNotPresent
    pullSecrets: []
  podSecurityContext:
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    # readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  priorityClassName: null
  resources: {}
  # -- We usually recommend not to specify default resources and to leave
  # this as a conscious choice for the user. This also increases chances
  # charts run on environments with little resources, such as Minikube. If
  # you do want to specify resources, uncomment the following lines, adjust
  # them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  serviceAccount:
    # -- Whether to create a Kubernetes service account for the trimmer.
    create: true
    # -- The name of the Kubernetes service account to use for the trimmer.
    # Can be the name of an existing Kubernetes service account, in which case
    # 'create' should be 'false'.
    name: hubble-timescape-trimmer
    # -- Annotations for the Hubble Timescape trimmer Kubernetes service account
    annotations: ~
  # -- Additional trimmer volumes.
  extraVolumes: []
  # -- Additional trimmer volumeMounts.
  extraVolumeMounts: []
  # -- Clickhouse allows specifying on the ClickHouse client for the trimmer
  # component connects to the database.
  clickhouse:
    client:
      dsn: {}
    tls:
      ca: {}
    credentials:
      # -- The ClickHouse username to authenticate with.
      username: timescape_trimmer
      # -- The name of the secret containing ClickHouse database admin
      # credentials.
      # DDL (CREATE, ALTER, DROP, TRUNCATE) and read permissions are
      # provided.
      # This secret MUST be created by the user, and MUST contain the following
      # key:
      #   - CLICKHOUSE_PASSWORD
      secretName: "hubble-timescape-trimmer-creds"
# -- Server is the component that implements and services the gRPC APIs. It
# consists of a single deployment and provides the hubble-timescape service
# that is typically accessed by Hubble UI, the Hubble CLI and the Hubble
# datasource plugin for Grafana.
server:
  # -- Deploy Hubble Timescape server to serve data over gRPC APIs.
  enabled: true
  # -- Configure log level for server. Defaults to the top level logLevel if
  # unset. Valid values are: trace, debug, info, warn and error.
  logLevel: ~
  replicaCount: 1
  image:
    override: ~
    repository: quay.io/isovalent/hubble-timescape
    tag: "v1.18.5"
    pullPolicy: IfNotPresent
    pullSecrets: []
  # -- Configure extra environment variables for timescape server.
  extraEnv: []
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    # readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  priorityClassName: null
  service:
    type: ClusterIP
    # -- The service port to expose. Unless overriden, this is automatically
    # set to `443` when TLS is enabled, and `80` otherwise.
    port: ~
  resources: {}
  # -- We usually recommend not to specify default resources and to leave
  # this as a conscious choice for the user. This also increases chances
  # charts run on environments with little resources, such as Minikube. If
  # you do want to specify resources, uncomment the following lines, adjust
  # them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  clickhouse:
    client:
      dsn: {}
    tls:
      ca: {}
    credentials:
      # -- The ClickHouse username to authenticate with.
      username: timescape_server
      # -- The name of the secret containing ClickHouse database credentials.
      # Only read permissions (SELECT, EXISTS) are required.
      # This secret MUST be created by the user, and MUST contain the following
      # key:
      #   - CLICKHOUSE_PASSWORD
      secretName: "hubble-timescape-server-creds"
  # -- queryCache configures the ClickHouse query cache.
  queryCache:
    # -- Whether to enable the query cache.
    # Defaults to true if unset.
    # Defaults to false if timescape lite or the push/stream API is enabled.
    enabled: ~
    # -- How long a query must run to be cached.
    minQueryDuration: 1s
    # -- How long a query result is cached.
    ttl: 60s
  # -- Roll out hubble-timescape-server pod when its configmap is updated.
  rollOutPods: true
  # -- TLS allows for configuring TLS for the server component.
  tls:
    # -- Enables TLS for timescape server.
    enabled: false
    auto:
      # -- Enables automatically provisioning TLS certificates.
      enabled: false
      # -- Set the method to auto-generate certificates. Supported values:
      # - cronJob:      This method uses a Kubernetes CronJob the generate any
      #                 certificates not provided by the user at installation
      #                 time.
      # - certmanager:  This method use cert-manager to generate & rotate certificates.
      method: ""
      certmanager:
        # -- Certificate issuer ref.
        # See https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
        issuerRef: ~
        # -- Algorithm configuration for the generated certificate. See
        # https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
        privateKey:
          algorithm: Ed25519
    # -- The name of the secret containing TLS material.
    # The secret must be of type `kubernetes.io/tls`.
    secretName: "hubble-timescape-server-cert"
    mtls:
      # -- Enables mTLS for Timescape's server.
      # When using RBAC with the 'tls' auth method, mTLS is enabled implicitly and this
      # option does not need to be set.
      enabled: false
    # -- Custom CA to validate client certificates.
    clientCA:
      configMap:
        name: ~
        key: ca.crt
  # -- the TCP port Timescape's server will bind to.
  port: 4244
  healthCheckPort: 8081
  pprof:
    # -- Enables pprof for Timescape's server.
    enabled: true
    address: localhost
    port: 6060
  gops:
    # -- Enables gops for Timescape's server.
    enabled: true
    port: 9898
  serviceAccount:
    # -- Whether to create a Kubernetes service account for the Hubble
    # Timescape server.
    create: true
    # -- The name of the Kubernetes service account to use for the Hubble
    # Timescape server. Can be the name of an existing Kubernetes service
    # account, in which case 'create' should be 'false'.
    name: hubble-timescape-server
    # -- Annotations for the Hubble Timescape server Kubernetes service account
    annotations: ~
  # -- Additional server volumes.
  extraVolumes: []
  # -- Additional server volumeMounts.
  extraVolumeMounts: []
  # -- Configures Oauth token-based authorization for Hubble Timescape server
  # API endpoint.
  rbac:
    # -- TLS must be enabled for RBAC to work.
    enabled: false
    # -- Which authentication model to use. Must be one of "oidc" or "tls".
    authMethod: oidc
    # -- OIDC Server discovery endpoint URL.
    # e.g. https://my-account.okta.com/oauth2/default/.well-known/openid-configuration
    oidcURL: ~
    # -- OIDC application clientID
    oidcClientID: ~
    # -- OIDC custom CA to verify against.
    oidcCA:
      configMap:
        name: ~
        key: "ca.crt"
    # -- TLS allows for configuring TLS for the rbac component.
    tls:
      # -- Custom CA to validate client certificates when using the `tls`
      # authentication method. Takes precedence over server.tls.clientCA
      # when clientCA.configMap.name is set.
      clientCA:
        configMap:
          name: ~
          key: ca.crt
    policy:
      # -- Whether to enable logging of a user's roles to debug logs when they
      # authenticate and make requests.
      logRoles: false
      # -- Configuration for the 'configMap' mode.
      #
      # The default is assuming that Timescape is ingesting data from another
      # cluster than the one in which it is deployed.
      #
      # See also
      # https://docs.isovalent.com/operations-guide/features/hubble-rbac/policy.html
      configMap:
        # -- Whether to create the configMap from where the mapping between
        # scope and roles are read. Set it to 'false' when the configMap is
        # created out-of-band.
        create: true
        # -- The list of roles to define.
        roles: []
        # - name: admin
        #   rules:
        #     - actions:
        #         - "*"
        #       kind: "*"
        #       allowAllContexts: true
        # -- The list of bindings between scope values and roles.
        bindings: []
        # - scope: groups
        #   value: admins
        #   role: admin
        # -- The name of the config map containing the policy document. If
        # managed out-of-band, the config map must have the name defined here.
        name: hubble-timescape-rbac-policy
        # -- The name of the config map key containing the policy document. If
        # managed out-of-band, the config map must contain the policy document
        # under this key.
        key: hubble-timescape-rbac-policy.yaml
  # -- Configure prometheus metrics, served at /metrics
  prometheus:
    enabled: true
    port: 9090
    prometheusRule:
      # -- Create a PrometheusRule resource with predefined alerts and recording rules.
      enabled: false
      namespace: ~
      labels: {}
      annotations: {}
      # -- List of alert names to disable.
      disabledAlerts: []
    serviceMonitor:
      # -- Create a ServiceMonitor resource to scrape metrics (requires prometheus-operator CRDs to be available)
      enabled: false
      # -- Namespace to create the service monitor in. Defaults to namespace of the helm release.
      namespace: ~
      # -- Labels to add to the ServiceMonitor
      labels: {}
      # -- Annotations to add to the ServiceMonitor
      annotations: {}
      # -- Scrape interval for Prometheus to scrape metrics
      scrapeInterval: 15s
  # -- experimentalAPI allows configuring the server to serve experimental
  # APIs. Experimental APIs may change at any time and without notice and thus
  # are not recommended for production deployments.
  experimentalAPI:
    enabled: false
  # -- Tracing configures OpenTelemetry tracing. Currently experimental.
  tracing: &tracing # -- Enables tracing functionality.
    enabled: false
    # -- Configures logging traces to stdout.
    logTraces: false
    #-- Configures client side sampling for traces.
    sampling:
      # -- Configures the span matcher sampler.
      spanMatcherSampler:
        # -- Matchers are used to determine if a span should be sampled.
        # Example:
        #  matchers:
        #  - matcher:
        #      name:
        #       exact: "Query"
        #    ratio: 1.0
        #  - matcher:
        #      name:
        #       exact: "Query"
        #      attributes:
        #        query_name:
        #       exact: "GetFlows"
        #    ratio: 0.5
        #  - matcher:
        #      name:
        #       exact: "Exec"
        #    ratio: 0.1
        #  - matcher:
        #      name:
        #       exact: "Exec"
        #     attributes:
        #       query_name:
        #         regex: ".*Inserter"
        #    ratio: 0.1
        matchers: []
    # --- Configures OTLP options.
    # OTLP can also be configured using the standard OTLP environment variables.
    # See https://opentelemetry.io/docs/concepts/sdk-configuration/otlp-exporter-configuration/ for documentation.
    otlp:
      # -- Enable exporting traces using OTLP.
      enabled: false
      # -- Override the default OTLP tracing endpoint.
      # See https://opentelemetry.io/docs/concepts/sdk-configuration/otlp-exporter-configuration/#otel_exporter_otlp_endpoint for the defaults.
      endpoint: ~
      # -- transport configures the OTLP transport protocol. Either http or
      # grpc. Defaults to grpc.
      transport: grpc
      # -- tls configure TLS related options for OTLP.
      tls:
        # -- enabled configure whether traces are sent over TLS or plaintext, set to false to disable TLS (insecure).
        enabled: true
        # -- OTLP custom CA to verify against.
        ca:
          configMap:
            # -- The name of a configMap containing the CA to verify the OTLP TLS certificate
            name: ~
            # -- The key inside of the configMap containing the CA to verify the OTLP TLS certificate
            key: "ca.crt"
      # -- urlPath allows one to override the default URL path used for sending traces over HTTP.
      # Ignored for gRPC.
      urlPath: ~
# -- Analyzer is a deployment responsible for running the policy engine at scheduled intervals
# and insert the produced reports in the ClickHouse database.
analyzer:
  # -- Deploy Hubble Timescape analyzer to generate assessment reports.
  enabled: true
  # -- Configure log level for analyzer. Defaults to the top level logLevel if
  # unset. Valid values are: trace, debug, info, warn and error.
  logLevel: ~
  replicaCount: 1
  image:
    override: ~
    repository: quay.io/isovalent/hubble-timescape
    tag: "v1.18.5"
    pullPolicy: IfNotPresent
    pullSecrets: []
  # -- Configure extra environment variables for timescape analyzer.
  extraEnv: []
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    # readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  priorityClassName: null
  resources: {}
  # -- We usually recommend not to specify default resources and to leave
  # this as a conscious choice for the user. This also increases chances
  # charts run on environments with little resources, such as Minikube. If
  # you do want to specify resources, uncomment the following lines, adjust
  # them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  clickhouse:
    client:
      dsn: {}
    tls:
      ca: {}
    credentials:
      # -- The ClickHouse username to authenticate with.
      username: timescape_analyzer
      # -- The name of the secret containing ClickHouse database credentials.
      # Write (INSERT) and read permissions (SELECT, EXISTS) are required.
      # This secret MUST be created by the user, and MUST contain the following
      # key:
      #   - CLICKHOUSE_PASSWORD
      secretName: "hubble-timescape-analyzer-creds"
  # -- Roll out hubble-timescape-analyzer pod when its configmap is updated.
  rollOutPods: true
  healthCheckPort: 8081
  pprof:
    # -- Enables pprof for Timescape's analyzer.
    enabled: true
    address: localhost
    port: 6060
  gops:
    # -- Enables gops for Timescape's analyzer.
    enabled: true
    port: 9898
  # -- Configure prometheus metrics, served at /metrics
  prometheus:
    enabled: true
    port: 9090
    serviceMonitor:
      # -- Create a ServiceMonitor resource to scrape metrics (requires prometheus-operator CRDs to be available)
      enabled: false
      # -- Namespace to create the service monitor in. Defaults to namespace of the helm release.
      namespace: ~
      # -- Labels to add to the ServiceMonitor
      labels: {}
      # -- Annotations to add to the ServiceMonitor
      annotations: {}
      # -- Scrape interval for Prometheus to scrape metrics
      scrapeInterval: 15s
  serviceAccount:
    # -- Whether to create a Kubernetes service account for the Hubble
    # Timescape analyzer.
    create: true
    # -- The name of the Kubernetes service account to use for the Hubble
    # Timescape analyzer. Can be the name of an existing Kubernetes service
    # account, in which case 'create' should be 'false'.
    name: hubble-timescape-analyzer
    # -- Annotations for the Hubble Timescape analyzer Kubernetes service account
    annotations: ~
  # -- Additional analyzer volumes.
  extraVolumes: []
  # -- Additional analyzer volumeMounts.
  extraVolumeMounts: []
  # -- The interval at which the analyzer will run and generate a new assessment report.
  # When a run goes beyond this interval, the next one will start as soon as the running
  # one is completed.
  scheduleInterval: "24h"
# -- The UI is a deployment that provides a frontend application to vizualize
