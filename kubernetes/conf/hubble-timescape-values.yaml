  podLabels: {}
  podSecurityContext:
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    # readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  priorityClassName: null
  service:
    type: ClusterIP
    pushPort: 4260
    streamPort: 4261
  resources: {}
  # -- We usually recommend not to specify default resources and to leave
  # this as a conscious choice for the user. This also increases chances
  # charts run on environments with little resources, such as Minikube. If
  # you do want to specify resources, uncomment the following lines, adjust
  # them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
  # -- Additional ingester volumes.
  extraVolumes: []
  # -- Additional ingester volumeMounts.
  extraVolumeMounts: []
  clickhouse:
    client:
      dsn: {}
    tls:
      ca: {}
    credentials:
      # -- The ClickHouse username to authenticate with.
      username: timescape_ingester
      # -- The name of the secret containing ClickHouse and (optionally) object
      # storage credentials.
      #
      # For ClickHouse, write (INSERT) and read permissions (SELECT, EXISTS) are
      # required. For object storage, only read permissions are required.
      #
      # This secret MUST be created by the user, and MUST contain the following
      # key:
      #   - CLICKHOUSE_PASSWORD
      #
      # The object storage access can be provided either via the ServiceAccount
      # or credentials in this secret. In the latter case, it should contain
      # one of the following sets of keys:
      # For AWS S3:
      #   - AWS_ACCESS_KEY_ID
      #   - AWS_SECRET_ACCESS_KEY
      #   - AWS_REGION
      # For Azure blob storage:
      #   - AZURE_STORAGE_ACCOUNT
      # as well as at least one of:
      #   - AZURE_STORAGE_KEY
      #   - AZURE_STORAGE_SAS_TOKEN
      # For Google Cloud Storage:
      #   - google-credentials.json
      secretName: "hubble-timescape-ingester-creds"
  # -- Roll out hubble-timescape-ingester pod when its configmap is updated.
  rollOutPods: true
  healthCheckPort: 8080
  pprof:
    # -- Enables pprof for Timescape's ingester.
    enabled: true
    address: localhost
    port: 6060
  gops:
    # -- Enables gops for Timescape's ingester.
    enabled: true
    port: 9898
  # -- Tracing configures OpenTelemetry tracing. Currently experimental.
  tracing: *tracing
  bucket:
    # -- The datalake URL. Every parts beyond the bucket name is interpreted as a
    # bucket prefix, that is gs://my-bucket/dir/subdir is equivalent to
    # gs://my-bucket?prefix=dir%2Fsubdir. Here are several examples:
    #
    # • s3://my-bucket (Amazon S3)
    # • gs://my-bucket (Google Cloud Storage)
    # • azblob://my-container (Azure Blob Storage)
    # • s3://mybucket?endpoint=my.minio.local:8080&disableSSL=true&s3ForcePathStyle=true (S3-Compatible Servers)
    uri: ""
    # -- A bucket prefix template to generate ingest paths. Exporters will
    # usually follow a pattern for uploaded files starting with the datetime of
    # upload in the object path. When non-empty, this pattern is used to
    # efficiently list only files to be ingested from the bucket. The following
    # format specifiers are supported:
    #
    # • %Y the year, matching exactly four digits (0001-9999)
    # • %m the month matching exactly two digits (01-12)
    # • %d the day matching exactly two digits (01-31)
    #
    # Note that the literal percent (%) character is not supported in
    # prefixPattern. Here are several examples:
    #
    # • %Y-%m-%d (hubble-s3 exporter)
    # • %Y/%m/%d/ (fluent-bit default s3_key_format)
    # • %Y%m%d (fluentd default time_slice_format)
    prefixPattern: ""
    # -- A cluster name to set on ingested events. If set the cluster name in flows
    # and events during ingestion is overwritten to the provided name.
    clusterName: ""
    tls:
      ca:
        configMap:
          # -- The name of a configMap containing the CA to verify the S3 API TLS certificate
          name: ~
          # -- The key inside of the configMap containing the CA to verify the S3 API TLS certificate
          key: "ca.crt"
  # -- Hubble Flows ingestion related configuration.
  flows:
    # -- Whether to enable ingestion of Hubble Flows.
    enabled: true
    # -- If a pattern is configured, it will be used to filter objects based on
    # their key, rather than filtering after it's downloaded.
    # Overrides the builtin default patterns for flows.
    # Pattern must be a valid re2 regular expression.
    # For example: `hubble\.log`
    pattern: ~
  # -- Hubble K8s Events ingestion related configuration.
  k8s:
    # -- Whether to enable ingestion of k8s events.
    enabled: true
    # -- If a pattern is configured, it will be used to filter objects based on
    # their key, rather than filtering after it's downloaded.
    # Overrides the builtin default patterns for k8s events.
    # Pattern must be a valid re2 regular expression.
    # For example: `k8s-events\.log`
    pattern: ~
  systemStatus:
    # -- Whether to enable ingestion of system status updates.
    enabled: true
    # -- If a pattern is configured, it will be used to filter objects based on
    # their key, rather than filtering after it's downloaded.
    # Overrides the builtin default patterns for system status events.
    # Pattern must be a valid re2 regular expression.
    # For example: `status\.log`
    pattern: ~
  # -- Connection logs ingestion related configuration.
  connectionLogs:
    # -- Whether to enable ingestion of connection logs.
    enabled: true
    # -- If a pattern is configured, it will be used to filter objects based on
    # their key, rather than filtering after it's downloaded.
    # Overrides the builtin default patterns for flows.
    # Pattern must be a valid re2 regular expression.
    # For example: `connectionlog\.log`
    pattern: ~
  # -- *experimental* Whether to delete files from object storage after successfully
  # ingesting them - will default to `true` in Timescape Lite mode.
  deleteAfterIngest: ~
  # -- How many times a file can be failed to be ingested before it gets
  # skipped when filtering objects in the bucket.
  maxAllowedIngestErrors: 3
  # -- *experimental* Configuration for the timescape ingester server.
  # Must be enabled to use the Push API or the Stream API. Automatically enabled if
  # lite.enabled is true.
  server:
    # -- The authentication method to use for the ingester server.
    # Supported values:
    # - none:        No authentication.
    # - basic-auth:  Basic authentication using a username and password. When set, the
    #                grpc server is automatically disabled because it does not support
    #                basic authentication.
    # - mtls:        Mutual TLS authentication using client certificates. When set, a
    #                client CA certificate must be configured under `ingester.server.tls.clientCA`.
    authMethod: none
    http:
      # -- Whether to enable the HTTP server for the Push API.
      enabled: false
      basicAuth:
        # -- The BasicAuth username to authenticate to the timescape ingester server.
        username: timescape_push_api
        # -- The name of the secret containing the BasicAuth password to authenticate
        # to the timescape ingester server
        #
        # This secret MUST be created by the user, and MUST contain the following
        # key:
        #   - PUSH_API_PASSWORD
        secretName: "hubble-timescape-ingester-creds"
    grpc:
      # -- *experimental* Whether to enable the gRPC server for the Stream API.
      enabled: true
      # -- The interval at which the ingester should flush events to the database.
      flushInterval: "5s"
    tls:
      # -- Enables TLS for timescape server.
      enabled: false
      auto:
        # -- Enables automatically provisioning TLS certificates.
        enabled: false
        # -- Set the method to auto-generate certificates. Supported values:
        # - cronJob:      This method uses a Kubernetes CronJob the generate any
        #                 certificates not provided by the user at installation
        #                 time.
        # - certmanager:  This method use cert-manager to generate & rotate certificates.
        method: ""
        certmanager:
          # -- Certificate issuer ref.
          # See https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
          issuerRef: ~
          # -- Algorithm configuration for the generated certificate. See
          # https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
          privateKey:
            algorithm: Ed25519
      # -- The name of the secret containing TLS material.
      # The secret must be of type `kubernetes.io/tls`.
      secretName: "hubble-timescape-ingester-server-cert"
      # -- Custom CA to validate client certificates.
      clientCA:
        configMap:
          name: ~
          key: ca.crt
  k8sImporter:
    # -- *experimental* Whether to enable the k8s event watcher for the K8s Importer.
    enabled: false
    # -- A cluster name to set on imported events. If set, the cluster name in
    # events is overwritten to the provided name.
    clusterName: ""
    # -- The interval at which the K8s Exporter should flush k8s events to the database.
    flushInterval: "5s"
    # enable importing Cilium Network Policy events.
    ciliumNetworkPolicies: true
    # enable importing k8s NetworkPolicy events
    k8sNetworkPolicies: true
    # enable importing k8s Endpoint events.
    k8sEndpoints: false
    # enable importing Cilium Endpoint events.
    ciliumEndpoints: false
    # enable importing Cilium Identity events.
    ciliumIdentities: true
    # enable importing Tetragon Network Policy events.
    tetragonNetworkPolicies: false
    # enable importing Cilium Node events.
    ciliumNodes: true
    # enable importing Tetragon Node events.
    tetragonNodes: false
    # enable importing SmartSwitch events
    smartSwitches: false
    # enable importing SmartSwitchNetworkPolicy events
    smartSwitchNetworkPolicies: false
  # -- Configure asynchronous inserts to insert data.
  asyncInsert:
    enabled: true
    # -- The maximum timeout since the first INSERT query before inserting collected data, when using asynchronous inserts.
    busyTimeout: "2s"
    # -- The maximum size of the unparsed data in bytes collected per query before being inserted.
    maxDataSize: 104857600
  # -- The number of entries to insert in the database per insertion block.
  # The minimum recommended value is 1,000. This number can be increased to
  # potentially improve ingestion performance at the cost of memory usage.
  # Values above 100,000 are not recommended.
  batchSize: 10_000
  # -- The interval at which the ingester will log a progress summary.
  reportInterval: "1s"
  # -- The interval at which the ingester will run. When a run goes beyond this
  # interval, the next one will start as soon as the running one is completed.
  scheduleInterval: "5m"
  # -- the timeout for s3.ListObjects or the equivalent API call for other
  # providers
  listObjectsTimeout: "1m"
  # -- The maximum lookback duration when listing objects in the bucket, zero means no limit.
  # This relies on having a bucket pattern configured.
  # If no bucket pattern is configured this setting has no effect.
  # If the value is higher than the largest TTL configured for ingestion, it
  # will be capped to that TTL.
  maxLookback: "24h"
  # -- Amount of files from storage to collect before checking the DB for their
  # ingestion status.
  filterBatchSize: 100
  # -- Maximum amount of time to wait between the checking the DB for a files
  # ingestion status if the filterBatchSize has not been reached.
  filterBatchWindow: "10s"
  # -- Disable default ingestion patterns.
  # When true, the ingester will not use builtin patterns to classify files.
  # The default pattern for hubble flows is: /(hubble|flows?)\.(json|jsonl|gz|gzip|log)/
  # The default pattern for k8s events is: /k8s-events?\.(json|jsonl|gz|gzip|log)/
  disableDefaultIngestPatterns: false
  # -- Disable required ingestion pattern matching.
  # If false, then the ingester skips files not matching configured file patterns.
  disableFileMustMatchIngestPattern: false
  serviceAccount:
    # -- Whether to create a Kubernetes service account for the Hubble
    # Timescape ingester.
    create: true
    # -- The name of the Kubernetes service account to use for the Hubble
    # Timescape ingester.
    # Can be the name of an existing Kubernetes service account, in which case
    # 'create' should be 'false'.
    name: hubble-timescape-ingester
    # -- Annotations for the Hubble Timescape ingester Kubernetes service account
    annotations: ~
  # -- Configure prometheus metrics, served at /metrics
  prometheus:
    enabled: true
    port: 9090
    prometheusRule:
      # -- Create a PrometheusRule resource with predefined alerts and recording rules.
      enabled: false
      namespace: ~
      labels: {}
      annotations: {}
      # -- List of alert names to disable.
      disabledAlerts: []
      rules:
        TimescapeEventDataStale:
          # -- Specify gracePeriod to override the default TimescapeEventDataStale gracePeriod of 3x the ingester scheduleInterval
          gracePeriod: ~
        TimescapeIngestionDurationHigh:
          gracePeriod: 5m
    serviceMonitor:
      # -- Create a ServiceMonitor resource to scrape metrics (requires prometheus-operator CRDs to be available)
      enabled: false
      # -- Namespace to create the service monitor in. Defaults to namespace of the helm release.
      namespace: ~
      # -- Labels to add to the ServiceMonitor
      labels: {}
      # -- Annotations to add to the ServiceMonitor
      annotations: {}
      # -- Scrape interval for Prometheus to scrape metrics
      scrapeInterval: 15s
# -- *experimental* Timescape Lite is the All-in-one Timescape deployment mode. It allows running
# all Timescape component such as server, ingester, migrator, and trimmer in one single
# StatefulSet
lite:
  enabled: true
  # -- Configure log level for Timescape lite. Defaults to the top level
  # logLevel if unset. Valid values are: trace, debug, info, warn and error.
  logLevel: ~
  image:
    override: ~
    repository: quay.io/isovalent/hubble-timescape-lite
    tag: "v1.18.6"
    pullPolicy: IfNotPresent
    pullSecrets: []
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    # readOnlyRootFilesystem: true
    privileged: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  priorityClassName: null
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  rollOutPods: true
  serviceAccount:
    # -- Whether to create a Kubernetes service account for the Timescape Lite deployment.
    create: true
    # -- The name of the Kubernetes service account to use for the Timescape Lite deployment.
    # Can be the name of an existing Kubernetes service account, in which case
    # 'create' should be 'false'.
    name: hubble-timescape-lite
    # -- Annotations for the Hubble Timescape Lite Kubernetes service account
    annotations: ~
  # -- Additional lite volumes.
  extraVolumes: []
  # -- Additional lite volumeMounts.
  extraVolumeMounts: []
  prometheus:
    enabled: true
    port: 9090
    serviceMonitor:
      # -- Create a ServiceMonitor resource to scrape metrics (requires prometheus-operator CRDs to be available).
      enabled: false
      # -- Namespace to create the service monitor in. Defaults to namespace of the helm release.
      namespace: ~
      # -- Labels to add to the ServiceMonitor
      labels: {}
      # -- Annotations to add to the ServiceMonitor
      annotations: {}
      # -- Scrape interval for Prometheus to scrape metrics
      scrapeInterval: 15s
  healthCheckPort: 8083
  pprof:
    # -- Enables pprof for Timescape's server.
    enabled: true
    address: localhost
    port: 6060
  gops:
    # -- Enables gops for Timescape's server.
    enabled: true
    port: 9898
  # -- Tracing configures OpenTelemetry tracing. Currently experimental.
  tracing: *tracing
  clickhouse:
    enabled: true
    # -- Roll out hubble-timescape-lite pod when the clickhouse configmap is updated
    # (lite.rolloutPods must also be true).
    rollOutPods: true
    # -- Configure prometheus metrics, served at /metrics
    prometheus:
      enabled: true
      serviceMonitor:
        # -- Create a ServiceMonitor resource to scrape metrics (requires prometheus-operator CRDs to be available)
        enabled: false
        # -- Namespace to create the service monitor in. Defaults to namespace of the helm release.
        namespace: ~
        # -- Labels to add to the ServiceMonitor
        labels: {}
        # -- Annotations to add to the ServiceMonitor
        annotations: {}
        # -- Scrape interval for Prometheus to scrape metrics
        scrapeInterval: 15s
      prometheusRule:
        # -- Create a PrometheusRule resource with predefined alerts and recording rules.
        enabled: false
        rules:
          # -- Alert that will fire if the percentage of available space of the ClickHouse
          # volume is predicted to fall below the configured threshold in the configured
          # predictionTime.
          #
          # By default this means if we predict less than 20% available space in 48 hours.
          TimescapeClickhouseVolumeFillingUp:
            enabled: true
            threshold: 0.2
            predictionTime: 48h
      tableMetrics:
        # -- Adds an endpoint to the ServiceMonitor resource to scrape table metrics
        # (requires ServiceMonitor to be enabled).
        enabled: false
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsGroup: 101
      runAsNonRoot: true
      runAsUser: 101
      seccompProfile:
        type: RuntimeDefault
    podSecurityContext:
      # clickhouse GID is 101, and mounted files need to have the correct
      # permissions for clickhouse to read them
      fsGroup: 101
      seccompProfile:
        type: RuntimeDefault
    volumes:
      # Configure volume for clickhouse. If no data volume is specified, clickhouse will
      # run on an ephemeral disk.
      #
      # Example:
      #
      # data:
      #   size: 2Gi
      #   storageClassName: ssd
      data: ~
    resources: {}
    # -- Additional clickhouse volumes.
    extraVolumes: []
    # -- Additional clickhouse volumeMounts.
    extraVolumeMounts: []
# -- Optional ConfigMap with a Grafana dashboard. It can be mounted in a Grafana
# deployment, or loaded automatically using the Grafana's sidecar for dashboards
# (https://github.com/grafana/helm-charts/tree/main/charts/grafana#sidecar-for-dashboards)
grafana:
  dashboards:
    enabled: true
    # -- Namespace to create the ConfigMap in. Defaults to namespace of the helm release.
    namespace: ~
    # -- Labels to add to the ConfigMap. If using the dashboards sidecar, they
    # must include the label used to discover dashboards.
    labels:
      grafana_dashboard: "1"
    # -- Annotations to add to the ConfigMap
    annotations: {}
config:
  # -- Buckets configuration. Incompatible with ingester.bucket.uri.
  # If you have multiple buckets, or different prefixes containing files to be
  # ingested, you should configure it using config.buckets.
  #
  # Example:
  #
  #buckets:
  #  -
  #    # -- The datalake URL. Every parts beyond the bucket name is interpreted as a
  #    # bucket prefix, that is gs://my-bucket/dir/subdir is equivalent to
  #    # gs://my-bucket?prefix=dir%2Fsubdir. Here are several examples:
  #    #
  #    # • s3://my-bucket (Amazon S3)
  #    # • gs://my-bucket (Google Cloud Storage)
  #    # • azblob://my-container (Azure Blob Storage)
  #    # • s3://mybucket?endpoint=my.minio.local:8080&disableSSL=true&s3ForcePathStyle=true (S3-Compatible Servers)
  #    uri: s3://timescape
  #    # top level configs for the whole bucket
  #    k8sEvents:
  #      # -- If a pattern is configured, it will be used to filter objects based on
  #      # their key, rather than filtering after it's downloaded.
  #      # Pattern must be a valid re2 regular expression.
  #      pattern: "k8s-events\\.log"
  #      # -- If disabled is true, events matching the pattern will not be ingested.
  #      disabled: false
  #    flows:
  #      # -- If a pattern is configured, it will be used to filter objects based on
  #      # their key, rather than filtering after it's downloaded.
  #      # Pattern must be a valid re2 regular expression.
  #      pattern: "hubble\\.log"
  #      # -- If disabled is true, events matching the pattern will not be ingested.
  #      disabled: false
  #    systemStatus:
  #      # -- If a pattern is configured, it will be used to filter objects based on
  #      # their key, rather than filtering after it's downloaded.
  #      # Pattern must be a valid re2 regular expression.
  #      pattern: "system-status\\.log"
  #      # -- If disabled is true, events matching the pattern will not be ingested.
  #      disabled: false
  #    connectionLogs:
  #      # -- If a pattern is configured, it will be used to filter objects based on
  #      # their key, rather than filtering after it's downloaded.
  #      # Pattern must be a valid re2 regular expression.
  #      pattern: "connectonlogs\\.log"
  #      # -- If disabled is true, events matching the pattern will not be ingested.
  #      disabled: false
  #    # -- Override the cluster name for the objects ingested from this bucket.
  #    overrideClusterName: 'cluster-1'
  #    # -- Paths are the bucket paths within the bucket to scan for files.
  #    paths:
  #      -
  #        # -- A bucket prefix template to generate ingest paths. Exporters will
  #        # usually follow a pattern for uploaded files starting with the datetime of
  #        # upload in the object path. When non-empty, this pattern is used to
  #        # efficiently list only files to be ingested from the bucket. The following
  #        # format specifiers are supported:
  #        #
  #        # • %Y the year, matching exactly four digits (0001-9999)
  #        # • %m the month matching exactly two digits (01-12)
  #        # • %d the day matching exactly two digits (01-31)
  #        #
  #        # Note that the literal percent (%) character is not supported in
  #        # prefixPattern. Here are several examples:
  #        #
  #        # • %Y-%m-%d (hubble-s3 exporter)
  #        # • %Y/%m/%d/ (fluent-bit default s3_key_format)
  #        # • %Y%m%d (fluentd default time_slice_format)
  #        prefixPattern: "hubble-events/%Y/%m/%d"
  #        # -- Override the cluster name for the objects ingested from this bucket within this prefix.
  #        # overrideClusterName: 'cluster-1'
  #
  # # Experimental
  #
  # Notice: this functionality is EXPERIMENTAL and may be changed or removed in a
  # later release.
  #
  # bucketName must be unique within the same provider+region so each bucket
  # can be uniquely identified.
  buckets: []
# -- TLS allows for configuring TLS for the server, the Push API and clickhouse
tls:
  # -- Enables TLS for all enabled components that don't explicitly disable TLS
  enabled: false
  auto:
    # -- Enables automatically provisioning TLS certificates.
    enabled: false
    # -- Set the method to auto-generate certificates. Supported values:
    # - cronJob:      This method uses a Kubernetes CronJob the generate any
    #                 certificates not provided by the user at installation
    #                 time.
    # - certmanager:  This method use cert-manager to generate & rotate certificates.
    method: ""
    certmanager:
      # -- Certificate issuer ref.
      # See https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
      issuerRef: ~
      # -- Algorithm configuration for the generated certificate. See
      # https://cert-manager.io/docs/usage/certificate/#creating-certificate-resources
      privateKey:
        algorithm: ECDSA
  # -- Configure the CA trust bundle used for the validation of the certificates.
  # When enabled, it overrides the content of the 'ca.crt' field of the respective
  # certificates, allowing for CA rotation with no down-time.
  caBundle:
    # -- Enable the use of the CA trust bundle.
    enabled: false
    # -- Name of the ConfigMap containing the CA trust bundle.
    name: ~
    # -- Entry of the ConfigMap containing the CA trust bundle.
    key: ca.crt
    # -- Use a Secret instead of a ConfigMap.
    useSecret: false
k8sExporter:
  fullnameOverride: hubble-timescape-k8s-exporter
  enabled: false
# -- Whether to use native Kubernetes gRPC-based probes (startup, liveness, readiness)
# which are stable since Kubernetes 1.27. If false, fallback to tcpSocket probes.
useKubernetesGrpcProbes: true
