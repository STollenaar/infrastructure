  pprof:
    # -- Enables pprof for Timescape UI
    enabled: true
    address: localhost
    port: 6060
  gops:
    # -- Enables gops for Timescape UI
    enabled: true
    port: 9898
  serviceAccount:
    # -- Whether to create a Kubernetes service account for the UI
    create: true
    # -- The name of the Kubernetes service account to use for the UI. Can be
    # the name of an existing Kubernetes service account, in which case
    # 'create' should be 'false'.
    name: hubble-timescape-ui
    # -- Annotations for the Hubble Timescape UI Kubernetes service account
    annotations: ~
  # -- Configure prometheus metrics, served at /metrics
  prometheus:
    enabled: true
    port: 9090
    serviceMonitor:
      # -- Create a ServiceMonitor resource to scrape metrics (requires prometheus-operator CRDs to be available)
      enabled: false
      # -- Namespace to create the service monitor in. Defaults to namespace of the helm release.
      namespace: ~
      # -- Labels to add to the ServiceMonitor
      labels: {}
      # -- Annotations to add to the ServiceMonitor
